<!doctype html>
<!-- Popup document shell for Deepgram setup and side panel launch. -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Transcript</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">
          <img class="brand-mark-image" src="icons/chrome-transcript.png" alt="">
        </div>
        <div class="header-copy">
          <div class="title-row">
            <h1>Transcript <span id="appVersion" class="app-version"></span></h1>
            <div id="headerLimits" class="limit-control" hidden>
              <div id="limitList" class="limit-list">No balance data yet.</div>
              <button id="balanceRefreshButton" class="refresh-button" type="button" title="Refresh Deepgram balance" aria-label="Refresh Deepgram balance">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 12a8 8 0 0 1-13.66 5.66M4 12A8 8 0 0 1 17.66 6.34M17 3v4h-4M7 21v-4h4"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </header>

      <section class="panel stt-panel">
        <div class="panel-header">
          <div>
            <strong>Deepgram Speech to Text</strong>
            <p class="muted"><span class="required-text">Required.</span> Needed for tab-audio transcription.</p>
          </div>
          <button id="deepgramSignupButton" class="footer-link" type="button">Get free API key</button>
        </div>
        <div class="deepgram-row">
          <input id="deepgramApiKeyInput" type="text" autocomplete="off" placeholder="API key">
          <button id="testDeepgramButton" class="mini-button" type="button">Test &amp; Save</button>
        </div>
        <p id="deepgramStatus" class="muted"></p>
      </section>

      <button id="openSidePanelButton" class="primary-button open-sidepanel-button" type="button" disabled>Start</button>
      <p id="mainStatus" class="muted" hidden></p>

      <footer class="app-footer">
        <button id="developerLink" class="footer-link" type="button">Developed by Barış Kısır</button>
        <button id="sourceLink" class="footer-link" type="button">Source</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
